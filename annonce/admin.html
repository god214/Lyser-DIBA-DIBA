<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administration - Lycée DIBA DIBA</title>
  <link rel="stylesheet" href="annonce.css">
</head>
<body>
  <header>
    <a href="annonce.html" class="logo"><span>A</span>dministration Annonces</a>
  </header>

  <section class="annonces">
    <h2>⚙️ Gestion des annonces</h2>

    <div>
      <label>Mot de passe : </label>
      <input type="password" id="password" placeholder="Mot de passe admin">
    </div>

    <div id="annonce-container" class="annonce-container"></div>

    <h3>➕ Ajouter / Modifier une annonce</h3>
    <form id="annonce-form">
      <input type="hidden" id="edit-index" value="">
      <input type="text" id="titre" placeholder="Titre" required><br><br>
      <textarea id="message" placeholder="Message" required></textarea><br><br>
      <input type="date" id="date" required><br><br>
      <button type="submit">💾 Sauvegarder</button>
    </form>
  </section>

  <script src="admin.js"></script>
</body>
</html>
